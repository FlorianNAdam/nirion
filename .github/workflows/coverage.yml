name: Coverage

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  statuses: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage-gate:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Allow coverage
        run: "true"

  coverage-status-pending:
    needs: coverage-gate
    runs-on: ubuntu-latest

    steps:
      - name: Set coverage status pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/${{ github.repository }}/statuses/$SHA" \
            -f state=pending \
            -f context=Coverage \
            -f description="Coverage is running" \
            -f target_url="$TARGET_URL"

  rust-coverage:
    needs: coverage-status-pending
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore Nix store
        uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-${{ github.event.workflow_run.head_sha || github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-check-

      - name: Restore and save Rust coverage cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: |
            . -> target/tarpaulin
          cache-targets: true
          cache-on-failure: true
          cache-bin: false
          cmd-format: nix develop -c {0}
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Generate Rust coverage
        run: |
          set -euo pipefail
          nix run .#rust-coverage

      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-coverage
          path: coverage-rust.info
          if-no-files-found: error

  nix-coverage:
    needs: coverage-status-pending
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore Nix store
        uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-${{ github.event.workflow_run.head_sha || github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-check-

      - name: Generate Nix coverage
        run: |
          set -euo pipefail
          nix run .#nix-coverage

      - name: Upload Nix coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nix-coverage
          path: coverage-nix.info
          if-no-files-found: error

  upload-coverage:
    needs:
      - rust-coverage
      - nix-coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore Nix store
        uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-${{ github.event.workflow_run.head_sha || github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-check-

      - name: Download Rust coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rust-coverage

      - name: Download Nix coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nix-coverage

      - name: Merge coverage
        run: |
          set -euo pipefail
          nix run .#merge-coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          file: coverage-merged.info
          format: lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}

  coverage-status-final:
    needs:
      - coverage-gate
      - coverage-status-pending
      - rust-coverage
      - nix-coverage
      - upload-coverage
    if: |
      always() &&
      needs.coverage-gate.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Set final coverage status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATE: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'error' || 'success' }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$STATE" \
            -f context=Coverage \
            -f description="Coverage $STATE" \
            -f target_url="$TARGET_URL"
