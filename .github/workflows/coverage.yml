name: Coverage

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore and save Rust coverage cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: |
            . -> target/tarpaulin
          cache-targets: true
          cache-on-failure: true
          cache-bin: false
          cmd-format: nix develop -c {0}
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Generate and upload coverage to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$COVERALLS_REPO_TOKEN" ]; then
            echo "COVERALLS_REPO_TOKEN is not configured" >&2
            exit 1
          fi

          nix run .#coverage -- --coveralls "$COVERALLS_REPO_TOKEN"
