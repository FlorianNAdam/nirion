name: Tag and Release

on:
  workflow_run:
    workflows: ["Check"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: tag-version
  cancel-in-progress: false

jobs:
  tag-and-release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch &&
      github.event.workflow_run.head_repository.full_name == github.repository

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Ensure commit is still the default-branch head
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch origin "$DEFAULT_BRANCH"
          current_sha=$(git rev-parse "origin/$DEFAULT_BRANCH")

          if [[ "$current_sha" != "$EXPECTED_SHA" ]]; then
            echo "Skipping stale commit $EXPECTED_SHA; current head is $current_sha"
            exit 0
          fi

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Get version from Nix
        id: version
        run: |
          version=$(nix eval --raw .#packages.x86_64-linux.default.version)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          tag="v$VERSION"

          if git rev-parse --verify "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; no new release required."
            exit 0
          fi

          echo "Creating tag $tag"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

          echo "Creating release $tag"

          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --verify-tag
