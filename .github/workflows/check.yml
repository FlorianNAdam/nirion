name: Check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover checks
    runs-on: ubuntu-latest

    outputs:
      vm-matrix: ${{ steps.discover.outputs.vm-matrix }}
      rust-checks: ${{ steps.discover.outputs.rust-checks }}
      nix-checks: ${{ steps.discover.outputs.nix-checks }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Discover checks
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          checks="$(
            nix eval --json \
              .#checks.x86_64-linux \
              --apply builtins.attrNames
          )"

          vm_matrix="$(
            jq -c '{
              include: [
                .[]
                | select(startswith("vm-"))
                | { check: ., name: sub("^vm-"; "") }
              ]
            }' <<< "$checks"
          )"

          rust_checks="$(
            jq -c '[.[] | select(. == "rust-tests")]' <<< "$checks"
          )"

          nix_checks="$(
            jq -c '[
              .[]
              | select(
                (startswith("vm-") | not)
                and . != "rust-tests"
                and . != "package"
              )
            ]' <<< "$checks"
          )"

          test "$vm_matrix" != '{"include":[]}'
          test "$rust_checks" != '[]'
          test "$nix_checks" != '[]'

          {
            echo "vm-matrix=$vm_matrix"
            echo "rust-checks=$rust_checks"
            echo "nix-checks=$nix_checks"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore Nix store
        uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-check-

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p binary-cache

          out="$(
            nix build \
              --no-link \
              --print-build-logs \
              --print-out-paths \
              .#packages.x86_64-linux.nirion
          )"

          printf 'binary output: %s\n' "$out"
          "$out/bin/nirion" --version

          printf '%s\n' "$out" > binary-cache/root

          nix copy \
            --to "file://$PWD/binary-cache/store" \
            "$out"

      - name: Upload binary closure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nirion-binary
          path: binary-cache
          retention-days: 1
          compression-level: 0

      - name: Save Nix store
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: nix-community/cache-nix-action/save@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          gc-max-store-size-linux: 6G

  rust:
    name: Rust tests
    needs: discover
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore Nix store
        uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-check-

      - name: Run Rust tests
        shell: bash
        env:
          RUST_CHECKS: ${{ needs.discover.outputs.rust-checks }}
        run: |
          set -euo pipefail

          mapfile -t checks < <(
            jq -r '.[] | ".#checks.x86_64-linux.\(.)"' <<< "$RUST_CHECKS"
          )

          nix build \
            --no-link \
            --keep-going \
            --print-build-logs \
            "${checks[@]}"

  nix:
    name: Nix checks
    needs:
      - discover
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore Nix store
        uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-check-

      - name: Download binary closure
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nirion-binary
          path: binary-cache

      - name: Import binary closure
        run: |
          nix copy \
            --no-check-sigs \
            --from "file://$PWD/binary-cache/store" \
            "$(cat binary-cache/root)"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: nix run .#check-message -- "$PR_TITLE"

      - name: Run Nix checks
        shell: bash
        env:
          NIX_CHECKS: ${{ needs.discover.outputs.nix-checks }}
        run: |
          set -euo pipefail

          mapfile -t checks < <(
            jq -r '.[] | ".#checks.x86_64-linux.\(.)"' <<< "$NIX_CHECKS"
          )

          nix build \
            --no-link \
            --keep-going \
            --print-build-logs \
            "${checks[@]}"

  vm:
    name: VM checks / ${{ matrix.name }}
    needs:
      - discover
      - build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.vm-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Restore Nix store
        uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}-
            nix-${{ runner.os }}-check-

      - name: Download binary closure
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nirion-binary
          path: binary-cache

      - name: Import binary closure
        run: |
          nix copy \
            --no-check-sigs \
            --from "file://$PWD/binary-cache/store" \
            "$(cat binary-cache/root)"

      - name: Run VM check
        run: |
          nix build \
            --no-link \
            --print-build-logs \
            ".#checks.x86_64-linux.${{ matrix.check }}"

  result:
    name: Check result
    needs:
      - discover
      - build
      - rust
      - nix
      - vm
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check required jobs
        env:
          DISCOVER_RESULT: ${{ needs.discover.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RUST_RESULT: ${{ needs.rust.result }}
          NIX_RESULT: ${{ needs.nix.result }}
          VM_RESULT: ${{ needs.vm.result }}
        run: |
          set -euo pipefail

          for result in \
            "$DISCOVER_RESULT" \
            "$BUILD_RESULT" \
            "$RUST_RESULT" \
            "$NIX_RESULT" \
            "$VM_RESULT"; do
            test "$result" = success
          done
