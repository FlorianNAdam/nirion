[package]
name = "nirion-lib"
version = "0.3.0"
edition = "2024"

[dependencies]
nirion-oci-lib = { version = "0.3.0", path = "../nirion-oci-lib" }
anyhow = "1.0.101"
crossterm = "0.29.0"
futures = "0.3.32"
indicatif = "0.18.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yml = "0.0.12"
tokio = { version = "1.52.3", features = ["io-util", "process", "rt", "sync", "time"] }
